    // Shuffle Function
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Prepare Quiz on Load
    const activeQuestions = [...pool];
    shuffleArray(activeQuestions);

    const form = document.getElementById('quiz-form');

    activeQuestions.forEach((q, qIdx) => {
        const block = document.createElement('div');
        block.className = 'question-block';
        
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = `${qIdx + 1}. ${q.question}`;
        block.appendChild(qText);

        // Render options
        q.options.forEach((opt, oIdx) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `question-${qIdx}`;
            radio.value = oIdx;
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(opt.text));
            block.appendChild(label);
        });

        // Hidden explanation block
        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.id = `explanation-${qIdx}`;
        
        let explanationHTML = '<h4>Rationales:</h4><ul>';
        q.options.forEach(opt => {
            explanationHTML += `<li><strong>${opt.text}</strong>: ${opt.rationale}</li>`;
        });
        explanationHTML += '</ul>';
        exp.innerHTML = explanationHTML;
        
        block.appendChild(exp);
        form.appendChild(block);
    });

    // Evaluate results and show explanation blocks at the end
    function evaluateQuiz() {
        let score = 0;
        activeQuestions.forEach((q, qIdx) => {
            const selected = document.querySelector(`input[name="question-${qIdx}"]:checked`);
            if (selected) {
                const selectedIdx = parseInt(selected.value);
                if (q.options[selectedIdx].isCorrect) {
                    score++;
                }
            }
            // Display explanation container
            document.getElementById(`explanation-${qIdx}`).style.display = 'block';
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerText = `You scored ${score} out of ${activeQuestions.length}!`;
        resultsDiv.style.display = 'block';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
